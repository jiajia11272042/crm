<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族树状图</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; overflow-x: auto; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .fullscreen { width: 100%; min-height: calc(100vh - 40px); display: flex; flex-direction: column; }
    .title { text-align: center; color: white; font-size: 28px; margin-bottom: 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
    .tree-area { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 10px; overflow-x: auto; }
    .stats-section { background: rgba(255,255,255,0.95); border-radius: 12px; padding: 16px; margin-top: 16px; }
    .stats-title { font-size: 18px; color: #333; margin-bottom: 12px; text-align: center; }
    .stats-grid { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }
    .stat-card { padding: 14px 24px; border-radius: 10px; text-align: center; min-width: 100px; }
    .stat-card:nth-child(1) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: white; }
    .stat-card:nth-child(2) { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .stat-card:nth-child(3) { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
    .stat-card:nth-child(4) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
    .stat-number { font-size: 28px; font-weight: bold; }
    .stat-label { font-size: 12px; opacity: 0.9; margin-top: 2px; }
    .legend { margin-top: 12px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #666; }
    .legend-color { width: 12px; height: 12px; border-radius: 2px; }
    .description { margin-top: 12px; padding: 12px; background: rgba(255,255,255,0.6); border-radius: 8px; text-align: center; }
    .description ul { padding-left: 18px; color: #555; font-size: 12px; line-height: 1.6; display: inline-block; text-align: left; }
    .reset-btn { display: block; margin: 12px auto 0; padding: 8px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 5px; font-size: 12px; cursor: pointer; }
    .node-box {
      padding: 8px 14px; border-radius: 8px; color: white; font-weight: bold; font-size: 12px; min-width: 60px;
      text-align: center; box-shadow: 0 3px 10px rgba(0,0,0,0.2); transition: all 0.3s ease; cursor: pointer; border: 2px solid transparent;
    }
    .node-box:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.5); }
    .node-box.editing { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
    .node-box.center { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); font-size: 16px; padding: 12px 24px; border: 3px solid #fff; }
    .node-box.father { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .node-box.mother { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
    .node-box.grandparent { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-size: 11px; padding: 6px 12px; }
    .node-box.son { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .node-box.daughter { background: linear-gradient(135deg, #eb2f96 0%, #fa541c 100%); }
    .node-box.niece { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); font-size: 10px; padding: 5px 8px; }
    .node-box.nephew { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); font-size: 10px; padding: 5px 8px; }
    .node-input { background: transparent; border: none; color: white; font-weight: bold; font-size: inherit; text-align: center; width: 100%; outline: none; font-family: inherit; }
    .edit-hint { font-size: 6px; opacity: 0.7; margin-top: 2px; font-weight: normal; }
    .connector-vertical { width: 2px; height: 12px; background: #999; }
    .tree-row { display: flex; justify-content: center; align-items: flex-start; gap: 16px; margin: 6px 0; flex-wrap: wrap; }
    .siblings-group { display: flex; flex-direction: column; align-items: center; }
    .siblings-list { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
    .uncle-aunt { position: relative; display: flex; flex-direction: column; align-items: center; }
    .children-row { display: flex; gap: 4px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
    .uncle-aunt-group { display: flex; gap: 8px; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const initialFamilyData = {
      paternal: {
        grandparents: '爷爷 奶奶',
        siblings: [
          { name: '大伯', children: ['堂哥', '堂姐'] },
          { name: '二伯', children: ['堂弟'] },
          { name: '爸爸', children: ['郑启薇'] },
          { name: '姑姑', children: ['表姐'] }
        ]
      },
      maternal: {
        grandparents: '姥姥 姥爷',
        siblings: [
          { name: '舅舅', children: ['表弟'] },
          { name: '妈妈', children: ['郑启薇'] },
          { name: '姨姨', children: ['表妹'] },
          { name: '叔叔', children: ['堂弟', '堂妹'] }
        ]
      }
    };

    const EditableNode = ({ name, type, onUpdateName, path }) => {
      const [isEditing, setIsEditing] = useState(false);
      const [editName, setEditName] = useState(name);
      const inputRef = useRef(null);

      useEffect(() => {
        if (isEditing && inputRef.current) { inputRef.current.focus(); inputRef.current.select(); }
      }, [isEditing]);

      const handleClick = () => { if (!isEditing) setIsEditing(true); };
      const handleBlur = () => {
        setIsEditing(false);
        if (editName.trim() && editName !== name) onUpdateName(path, editName.trim());
        else setEditName(name);
      };
      const handleKeyDown = (e) => {
        if (e.key === 'Enter') handleBlur();
        else if (e.key === 'Escape') { setEditName(name); setIsEditing(false); }
      };

      return (
        <div className={`node-box ${type} ${isEditing ? 'editing' : ''}`} onClick={handleClick}>
          {isEditing ? (
            <input ref={inputRef} className="node-input" value={editName} onChange={(e) => setEditName(e.target.value)} onBlur={handleBlur} onKeyDown={handleKeyDown} placeholder="..." />
          ) : (<>{name}<div className="edit-hint">点击</div></>)}
        </div>
      );
    };

    const UncleAuntWithChildren = ({ data, side, onUpdateName }) => {
      const isMe = data.children.includes('郑启薇');
      const childType = side === 'paternal' ? 'nephew' : 'niece';
      
      return (
        <div className="uncle-aunt">
          <EditableNode name={data.name} type={isMe ? (data.name.includes('爸') ? 'father' : 'mother') : (data.name.includes('伯') || data.name.includes('叔') || data.name.includes('舅') ? 'son' : 'daughter')} onUpdateName={onUpdateName} path={`${side}.siblings.${data.index}`} />
          {data.children.length > 0 && (
            <>
              <div className="connector-vertical"></div>
              <div className="children-row">
                {data.children.map((child, i) => (
                  <EditableNode key={i} name={child} type={child === '郑启薇' ? 'center' : childType} onUpdateName={onUpdateName} path={`${side}.siblings.${data.index}.children.${i}`} />
                ))}
              </div>
            </>
          )}
        </div>
      );
    };

    const App = () => {
      const [familyData, setFamilyData] = useState(initialFamilyData);

      const updateName = (path, newName) => {
        const paths = path.split('.');
        setFamilyData(prev => {
          const updated = JSON.parse(JSON.stringify(prev));
          let current = updated;
          for (let i = 0; i < paths.length - 1; i++) {
            current = current[paths[i]];
          }
          current[paths[paths.length - 1]] = newName;
          return updated;
        });
      };

      const handleReset = () => setFamilyData(initialFamilyData);

      const SideTree = ({ side, title }) => {
        const data = familyData[side];
        const siblingsWithIndex = data.siblings.map((s, i) => ({ ...s, index: i }));
        
        return (
          <div className="siblings-group">
            <EditableNode name={data.grandparents} type="grandparent" onUpdateName={updateName} path={`${side}.grandparents`} />
            <div className="connector-vertical"></div>
            <div className="uncle-aunt-group">
              {siblingsWithIndex.map((sibling, i) => (
                <UncleAuntWithChildren key={i} data={sibling} side={side} onUpdateName={updateName} />
              ))}
            </div>
          </div>
        );
      };

      return (
        <div className="fullscreen">
          <h1 className="title">🌳 家族树状图（郑启薇）</h1>
          
          <div className="tree-area">
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
              
              <div className="tree-row">
                <SideTree side="paternal" title="父系" />
                <div style={{ width: 2, height: 80, background: '#999', margin: '0 20px' }}></div>
                <SideTree side="maternal" title="母系" />
              </div>

            </div>
          </div>
          
          <div className="description">
            <ul>
              <li>点击任意卡片编辑名字</li>
              <li>Enter确认 / Esc取消</li>
            </ul>
          </div>
          
          <div className="legend">
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'}}></div><span>郑启薇</span></div>
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}></div><span>爷爷/奶奶</span></div>
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #ee0979 0%, #ff6a00 100%)'}}></div><span>姥姥/姥爷</span></div>
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)'}}></div><span>儿子</span></div>
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #eb2f96 0%, #fa541c 100%)'}}></div><span>女儿</span></div>
            <div className="legend-item"><div className="legend-color" style={{background: 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)'}}></div><span>侄子/侄女</span></div>
          </div>

          <button className="reset-btn" onClick={handleReset}>🔄 重置</button>

          <div className="stats-section">
            <h2 className="stats-title">📊 家族成员</h2>
            <div className="stats-grid">
              <div className="stat-card"><div className="stat-number">4</div><div className="stat-label">祖辈</div></div>
              <div className="stat-card"><div className="stat-number">8</div><div className="stat-label">叔伯姨舅姑</div></div>
              <div className="stat-card"><div className="stat-number">8</div><div className="stat-label">堂表兄弟姐妹</div></div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
